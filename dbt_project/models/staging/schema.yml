version: 2

sources:
  - name: raw_retail
    schema: RAW_RETAIL
    tables:
      - name: sales_raw
        description: "Línea de venta tal como llega del POS, sin transformar."
      - name: products_raw
        description: "Catálogo de productos, full-refresh diario."
      - name: stores_raw
        description: "Catálogo de tiendas, full-refresh diario."
 
models:
  - name: stg_sales
    description: "Ventas limpias y tipadas."
    columns:
      - name: sale_id
        data_tests:
          - unique
          - not_null
      - name: sale_date
        data_tests:
          - not_null
      - name: store_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

  - name: stg_products
    description: "Catálogo de productos limpio."
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: unit_price
        data_tests:
          - not_null

  - name: stg_stores
    description: "Catálogo de tiendas limpio."
    columns:
      - name: store_id
        data_tests:
          - unique
          - not_null